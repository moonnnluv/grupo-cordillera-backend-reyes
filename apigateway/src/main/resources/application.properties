# apigateway/src/main/resources/application.properties
spring.application.name=api-gateway
server.port=9090

# ── Gateway routes ───────────────────────────────────────────────
spring.cloud.gateway.server.webmvc.routes[0].id=ms-datos
spring.cloud.gateway.server.webmvc.routes[0].uri=${MS_DATOS_URL:http://ms-datos:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/datos/**

spring.cloud.gateway.server.webmvc.routes[1].id=ms-kpi
spring.cloud.gateway.server.webmvc.routes[1].uri=${MS_KPI_URL:http://ms-kpi:8082}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/kpi/**

spring.cloud.gateway.server.webmvc.routes[2].id=ms-reportes
spring.cloud.gateway.server.webmvc.routes[2].uri=${MS_REPORTES_URL:http://ms-reportes:8083}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/reportes/**

spring.cloud.gateway.server.webmvc.routes[3].id=ms-auth
spring.cloud.gateway.server.webmvc.routes[3].uri=${MS_AUTH_URL:http://ms-auth:8084}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[4].id=ms-bff
spring.cloud.gateway.server.webmvc.routes[4].uri=${MS_BFF_URL:http://ms-bff:8085}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/bff/**

# ── Health proxy routes (sin autenticación) ──────────────────────
spring.cloud.gateway.server.webmvc.routes[5].id=health-datos
spring.cloud.gateway.server.webmvc.routes[5].uri=${MS_DATOS_URL:http://ms-datos:8081}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/health/datos
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=RewritePath=/health/(?<remaining>.*),/actuator/health

spring.cloud.gateway.server.webmvc.routes[6].id=health-kpi
spring.cloud.gateway.server.webmvc.routes[6].uri=${MS_KPI_URL:http://ms-kpi:8082}
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/health/kpi
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=RewritePath=/health/(?<remaining>.*),/actuator/health

spring.cloud.gateway.server.webmvc.routes[7].id=health-reportes
spring.cloud.gateway.server.webmvc.routes[7].uri=${MS_REPORTES_URL:http://ms-reportes:8083}
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/health/reportes
spring.cloud.gateway.server.webmvc.routes[7].filters[0]=RewritePath=/health/(?<remaining>.*),/actuator/health

spring.cloud.gateway.server.webmvc.routes[8].id=health-auth
spring.cloud.gateway.server.webmvc.routes[8].uri=${MS_AUTH_URL:http://ms-auth:8084}
spring.cloud.gateway.server.webmvc.routes[8].predicates[0]=Path=/health/auth
spring.cloud.gateway.server.webmvc.routes[8].filters[0]=RewritePath=/health/(?<remaining>.*),/actuator/health

spring.cloud.gateway.server.webmvc.routes[9].id=health-bff
spring.cloud.gateway.server.webmvc.routes[9].uri=${MS_BFF_URL:http://ms-bff:8085}
spring.cloud.gateway.server.webmvc.routes[9].predicates[0]=Path=/health/bff
spring.cloud.gateway.server.webmvc.routes[9].filters[0]=RewritePath=/health/(?<remaining>.*),/actuator/health

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info