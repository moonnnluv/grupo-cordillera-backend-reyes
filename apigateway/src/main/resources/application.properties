spring.application.name=api-gateway
server.port=9090

# ── Rutas hacia los microservicios ──────────────────────────────
# Dentro de Docker se usan los nombres de los contenedores.
# Fuera de Docker (dev local) se usa localhost.

MS_DATOS_URL=${MS_DATOS_URL:http://ms-datos:8081}
MS_KPI_URL=${MS_KPI_URL:http://ms-kpi:8082}
MS_REPORTES_URL=${MS_REPORTES_URL:http://ms-reportes:8083}
MS_AUTH_URL=${MS_AUTH_URL:http://ms-auth:8084}

# ── Gateway routes ───────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[0].id=ms-datos
spring.cloud.gateway.mvc.routes[0].uri=${MS_DATOS_URL}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/datos/**

spring.cloud.gateway.mvc.routes[1].id=ms-kpi
spring.cloud.gateway.mvc.routes[1].uri=${MS_KPI_URL}
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/kpi/**

spring.cloud.gateway.mvc.routes[2].id=ms-reportes
spring.cloud.gateway.mvc.routes[2].uri=${MS_REPORTES_URL}
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/reportes/**

spring.cloud.gateway.mvc.routes[3].id=ms-auth
spring.cloud.gateway.mvc.routes[3].uri=${MS_AUTH_URL}
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/auth/**

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info