services:

  # ── BASES DE DATOS ──────────────────────────────

  db-datos:
    image: mysql:8.0
    container_name: db-datos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: baseorganizacional
    volumes:
      - datos-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-kpi:
    image: mysql:8.0
    container_name: db-kpi
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: basekpi
    volumes:
      - kpi-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-reportes:
    image: mysql:8.0
    container_name: db-reportes
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: basereportes
    volumes:
      - reportes-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-auth:
    image: mysql:8.0
    container_name: db-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: baseauth
    volumes:
      - auth-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── MICROSERVICIOS ──────────────────────────────

  ms-datos:
    build: ./msdatos
    container_name: ms-datos
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-datos:3306/baseorganizacional
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db-datos:
        condition: service_healthy
    networks:
      - spring-net

  ms-kpi:
    build: ./mskpi
    container_name: ms-kpi
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-kpi:3306/basekpi
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db-kpi:
        condition: service_healthy
    networks:
      - spring-net

  ms-reportes:
    build: ./msreportes
    container_name: ms-reportes
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-reportes:3306/basereportes
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db-reportes:
        condition: service_healthy
    networks:
      - spring-net

  ms-auth:
    build: ./msauth
    container_name: ms-auth
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-auth:3306/baseauth
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db-auth:
        condition: service_healthy
    networks:
      - spring-net

  api-gateway:
    build: ./apigateway
    container_name: api-gateway
    ports:
      - "9090:9090"
    environment:
      MS_DATOS_URL: http://ms-datos:8081
      MS_KPI_URL: http://ms-kpi:8082
      MS_REPORTES_URL: http://ms-reportes:8083
      MS_AUTH_URL: http://ms-auth:8084
      MS_BFF_URL: http://ms-bff:8085
    depends_on:
      - ms-datos
      - ms-kpi
      - ms-reportes
      - ms-auth
      - ms-bff
    networks:
      - spring-net

  ms-bff:
    build: ./msbff  
    container_name: ms-bff
    ports:
      - "8085:8085"
    environment:
      MS_DATOS_URL: http://ms-datos:8081
      MS_KPI_URL: http://ms-kpi:8082
      MS_REPORTES_URL: http://ms-reportes:8083
    depends_on:
      - ms-datos
      - ms-kpi
      - ms-reportes
    networks:
      - spring-net

# ── VOLÚMENES Y RED ─────────────────────────────

volumes:
  datos-data:
  kpi-data:
  reportes-data:
  auth-data:

networks:
  spring-net:
    driver: bridge